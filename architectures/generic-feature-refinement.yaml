schema_version: architecture-v0.2
id: generic_feature_refinement
name: Generic Feature Refinement Pipeline
family: transformer
status: draft
task_modes:
  - prediction
  - generation
sources:
  - kind: repo
    path: architectures/generic-feature-refinement.yaml
    note: Neutral demo source for the architecture language.
  - kind: protocol
    path: protocol/architecture-language.md
    note: Defines the source vocabulary.
execution:
  loops:
    - id: refinement_loop
      repeats: configurable_refinement_steps
      reruns:
        - input_adapter
        - item_encoder
        - group_refiner
        - output_decoder
      cached:
        - attention_mask
        - item_to_group_index
      notes:
        - Context can be cached when the inputs and grouping map do not change.
      evidence:
        status: inferred
        refs:
          - kind: protocol
            path: protocol/architecture-language.md
            note: Demonstrates how loops are represented.
state_semantics:
  item_state:
    role: mutable_state
    produced_by: input_adapter
    updated_by:
      - item_encoder
    consumed_by:
      - context_builder
      - item_to_group_pool
      - output_decoder
    notes:
      - The item stream is the fine-scale mutable state.
  pair_context:
    role: read_only_conditioning
    produced_by: context_builder
    updated_by: []
    consumed_by:
      - group_refiner
    notes:
      - It is projected to attention-logit bias but is not updated by the refiner in this demo.
  group_state:
    role: mutable_state
    produced_by: item_to_group_pool
    updated_by:
      - group_refiner
    consumed_by:
      - output_decoder
conditioning:
  - id: item_adaln
    relation_ref: conditioning_signal_modulates_item_encoder
    source: conditioning_signal
    target: item_encoder
    mode: per_item_adaln
    standard_block_ref: standard_blocks/per-item-adaln-conditioning.yaml
    updates_source: false
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
          note: Neutral demo conditioning path.
  - id: group_pair_bias
    relation_ref: pair_context_biases_group_refiner
    source: pair_context
    target: group_refiner.attention_logits
    mode: pair_bias
    standard_block_ref: standard_blocks/pair-biased-attention.yaml
    updates_source: false
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
          note: Neutral demo pair/context bias path.
scale_transitions:
  - id: item_to_group_pool
    from_scale: item
    to_scale: group
    source: item_state
    target: group_state
    projection: item_to_group_projection
    index_map: item_to_group_index
    aggregation: scatter_mean
    copy_vs_pool: pool
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
          note: Neutral demo compression path.
  - id: group_to_item_broadcast
    from_scale: group
    to_scale: item
    source: group_state
    target: item_output_state
    projection: group_to_item_projection
    index_map: item_to_group_index
    aggregation: gather
    copy_vs_pool: copy
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
          note: Neutral demo broadcast path.
training_inference:
  objective:
    kind: unknown
  schedule:
    kind: none
  sampler:
    kind: one_shot
  teacher_forcing: unknown
  self_conditioning: unknown
  checkpoint_notes:
    - This demo is architectural only; it is not tied to a training recipe.
representations:
  - id: raw_records
    scale: item
    semantic_role: input records before embedding
    shape: "B x N_item x input_fields"
    carries:
      - raw features
      - masks
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_state
    scale: item
    semantic_role: mutable fine-scale latent state
    shape: "B x N_item x d_item"
    carries:
      - local content
      - positional features
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: conditioning_signal
    scale: item
    semantic_role: per-item conditioning stream
    shape: "B x N_item x d_cond"
    carries:
      - control signal
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: pair_context
    scale: item_pair
    semantic_role: pair/context attention bias source
    shape: "B x N_group x N_group x d_pair"
    carries:
      - relation features
      - mask features
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_to_group_index
    scale: index_map
    semantic_role: maps fine items to coarse groups
    shape: "B x N_item"
    carries:
      - group ownership
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: group_state
    scale: group
    semantic_role: compressed coarse latent state
    shape: "B x N_group x d_group"
    carries:
      - pooled item evidence
      - refined context
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_output_state
    scale: item
    semantic_role: item-scale decoded state
    shape: "B x N_item x d_out"
    carries:
      - broadcast group context
      - fine item skip
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: predictions
    scale: output
    semantic_role: task-specific output values
    shape: "B x N_item x output_fields"
    carries:
      - prediction heads
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
modules:
  - id: input_adapter
    label: Input Adapter
    kind: feature_adapter
    role: embed raw records and build initial item state, conditioning signal, masks, and grouping indices
    scale: item
    inputs:
      - raw_records
    outputs:
      - item_state
      - conditioning_signal
      - item_to_group_index
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: context_builder
    label: Context Builder
    kind: pair_context_builder
    role: construct pair/context features used later as attention bias
    scale: item_pair
    inputs:
      - item_state
      - item_to_group_index
    outputs:
      - pair_context
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_encoder
    label: Item Encoder
    kind: attention_stack
    role: update fine-scale item state with local attention and per-item conditioning
    scale: item
    repeats: 3
    pseudocode_ref: pseudocode/generic-feature-refinement.yaml
    depth:
      blocks: 3
      heads: 8
    contains:
      - id: per_item_adaln
        label: Per-item AdaLN
        standard_block_ref: standard_blocks/per-item-adaln-conditioning.yaml
    inputs:
      - item_state
      - conditioning_signal
    outputs:
      - item_state
    attention:
      pattern: local
      query_scale: item
      key_value_scale: item
      heads: 8
      pair_bias: false
      pair_bias_source: none
      positional_encoding:
        kind: relative_position
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_to_group_pool
    label: Item-to-Group Pool
    kind: scale_transition
    role: compress item states into group states using an ownership index
    scale: group
    inputs:
      - item_state
      - item_to_group_index
    outputs:
      - group_state
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: group_refiner
    label: Group Refiner
    kind: attention_stack
    role: update compressed group state with full attention and pair/context bias
    scale: group
    repeats: 6
    pseudocode_ref: pseudocode/generic-feature-refinement.yaml
    depth:
      blocks: 6
      heads: 8
    contains:
      - id: pair_biased_attention
        label: Pair-biased attention
        standard_block_ref: standard_blocks/pair-biased-attention.yaml
    inputs:
      - group_state
      - pair_context
    outputs:
      - group_state
    attention:
      pattern: full
      query_scale: group
      key_value_scale: group
      heads: 8
      pair_bias: true
      pair_bias_source: pair_context
      standard_block_ref: standard_blocks/pair-biased-attention.yaml
      positional_encoding:
        kind: relative_position
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: output_decoder
    label: Output Decoder
    kind: decoder
    role: broadcast group output back to item resolution and fuse the item skip state
    scale: item
    inputs:
      - group_state
      - item_state
      - item_to_group_index
    outputs:
      - item_output_state
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: output_heads
    label: Output Heads
    kind: prediction_heads
    role: project decoded item state to task-specific predictions
    scale: output
    inputs:
      - item_output_state
    outputs:
      - predictions
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
relations:
  - id: raw_records_enter_input_adapter
    from: raw_records
    to: input_adapter
    carries: [raw fields]
    operation: embed_inputs
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: input_adapter_initializes_item_state
    from: input_adapter
    to: item_state
    carries: [item_state]
    operation: initialize_state
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: input_adapter_initializes_conditioning_signal
    from: input_adapter
    to: conditioning_signal
    carries: [conditioning_signal]
    operation: initialize_conditioning
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_state_feeds_context_builder
    from: item_state
    to: context_builder
    carries: [item_state]
    operation: pair_context_construction
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: context_builder_produces_pair_context
    from: context_builder
    to: pair_context
    carries: [pair_context]
    operation: build_pair_context
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_state_feeds_item_encoder
    from: item_state
    to: item_encoder
    carries: [item_state]
    operation: item_attention_update
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: conditioning_signal_modulates_item_encoder
    from: conditioning_signal
    to: item_encoder
    kind: conditioning
    carries: [conditioning_signal]
    operation: adaptive_conditioning
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_encoder_updates_item_state
    from: item_encoder
    to: item_state
    carries: [item_state]
    operation: item_attention_update
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_encoder_feeds_item_to_group_pool
    from: item_encoder
    to: item_to_group_pool
    carries: [item_state]
    operation: prepare_compression
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_to_group_pool_produces_group_state
    from: item_to_group_pool
    to: group_state
    carries: [group_state]
    operation: scatter_mean
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: group_state_feeds_group_refiner
    from: group_state
    to: group_refiner
    carries: [group_state]
    operation: group_attention_update
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: pair_context_biases_group_refiner
    from: pair_context
    to: group_refiner
    kind: conditioning
    carries: [pair_context]
    operation: pair_bias
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: group_refiner_updates_group_state
    from: group_refiner
    to: group_state
    carries: [group_state]
    operation: group_attention_update
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: group_refiner_feeds_output_decoder
    from: group_refiner
    to: output_decoder
    carries: [group_state]
    operation: decode_groups
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: output_decoder_produces_item_output_state
    from: output_decoder
    to: item_output_state
    carries: [item_output_state]
    operation: broadcast_and_fuse
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: item_output_state_feeds_output_heads
    from: item_output_state
    to: output_heads
    carries: [item_output_state]
    operation: output_projection
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: output_heads_produce_predictions
    from: output_heads
    to: predictions
    carries: [predictions]
    operation: predict
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
claims:
  - id: context_bias_is_read_only
    statement: The pair/context stream is used as attention-logit conditioning in the group refiner and is not updated there.
    scope:
      module: group_refiner
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
  - id: compression_is_explicit
    statement: The item-to-group transition is modeled as pooling, while the group-to-item transition is modeled as broadcast/gather.
    scope:
      transition: item_to_group_pool
    evidence:
      status: inferred
      refs:
        - kind: source
          path: architectures/generic-feature-refinement.yaml
open_questions:
  - id: update_pair_context
    question: Should a concrete architecture update pair/context state or keep it read-only?
    status: unresolved
